services:
  - type: web
    name: fileshare-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: FRONTEND_URL
        value: https://fileshare-frontend.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
    rootDir: backend
