services:
  - type: web
    name: fileshare-backend
    env: python
    plan: free
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_ACCESS_KEY_ID
        scope: build
      - key: AWS_SECRET_ACCESS_KEY
        scope: build
      - key: S3_BUCKET
        value: fileshare-room
      - key: READ_ROLE_ARN
        value: arn:aws:iam::411072614445:role/fileshare-readonly-role
      - key: WRITE_ROLE_ARN
        value: arn:aws:iam::411072614445:role/fileshare-upload-role
      - key: DYNAMO_TABLE
        value: fileshare-rooms
      - key: SECRET_KEY
        scope: build
      - key: FRONTEND_URL
        value: https://fileshare-frontend.vercel.app